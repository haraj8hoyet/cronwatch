type: object
required:
  - jobs
properties:
  jobs:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - schedule
      properties:
        name:
          type: string
        schedule:
          type: string
        timeout:
          type: integer
          minimum: 1
        tags:
          type: array
          items:
            type: string
  alerts:
    type: object
    properties:
      email:
        type: object
        properties:
          to:
            type: string
          from:
            type: string
          smtp_host:
            type: string
          smtp_port:
            type: integer
      webhooks:
        type: array
        items:
          oneOf:
            - type: string
            - type: object
              required:
                - url
              properties:
                url:
                  type: string
                timeout:
                  type: integer
                  minimum: 1
                secret_header:
                  type: string
                secret_value:
                  type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
      suppress:
        type: array
        items:
          oneOf:
            - type: string
            - type: object
              required:
                - pattern
              properties:
                pattern:
                  type: string
                reason:
                  type: string
      cooldown_minutes:
        type: integer
        minimum: 0
      escalation:
        type: object
        properties:
          threshold:
            type: integer
            minimum: 1
          contact:
            type: string
